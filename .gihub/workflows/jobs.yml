name: Daily Job Briefing

on:
  schedule:
    # Runs every day at 06:00 UTC (08:00 Oslo summer, 07:00 winter)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run collector
        run: python collect.py

      - name: Commit and push jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          git diff --staged --quiet || git commit -m "Update jobs $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
